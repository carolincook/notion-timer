<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Timer Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --accent: #204ff5;
      --hover: #c0deff;
      --card: #f4f4f4;
      --border: #d8d8d8;
      --text: #111111;
      --muted: #8f8f8f;
      --shadow: 0 1px 0 rgba(0, 0, 0, 0.03);
      --btn-radius: 18px;
      --stroke: 10;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      padding: 8px;
    }

    .hidden {
      display: none !important;
    }

    .builder-shell {
      display: grid;
      grid-template-columns: minmax(0, 520px) minmax(320px, 420px);
      gap: 28px;
      align-items: start;
      justify-content: center;
      max-width: 1040px;
      margin: 0 auto;
    }

    body.timer-mode .builder-shell {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    body.timer-mode .preview-card-wrap {
      width: min(420px, 100%);
    }

    .preview-card-wrap {
      width: 100%;
    }

    .card {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: clamp(24px, 10%, 42px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      overflow: hidden;
    }

    .builder-card {
      max-width: 520px;
      align-items: stretch;
      gap: 20px;
    }

    .builder-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin: 0;
    }

    .builder-subtitle {
      margin: -4px 0 4px;
      color: #666;
      font-size: 14px;
      line-height: 1.45;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .field-label {
      font-size: 14px;
      font-weight: 600;
    }

    .field-input,
    .field-select {
      width: 100%;
      border: 2px solid #1f1f1f;
      background: #ffffff;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 16px;
      line-height: 1.2;
      color: var(--text);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
      font-family: inherit;
      box-shadow: none;
      appearance: none;
      -webkit-appearance: none;
    }

    .field-input:hover,
    .field-input:focus,
    .field-select:hover,
    .field-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(32, 79, 245, 0.1);
      background: #fff;
    }

    .builder-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }

    .builder-grid.compact {
      grid-template-columns: minmax(0, 2.2fr) minmax(140px, 1fr);
      gap: 16px;
      align-items: end;
    }

    .result-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px;
      gap: 16px;
      width: 100%;
      align-items: stretch;
    }

    .builder-actions.side {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .builder-button {
      min-height: 52px;
      padding: 0 20px;
      border-radius: 16px;
      border: 1px solid #bcbcbc;
      background: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background-color 0.18s ease, transform 0.08s ease, border-color 0.18s ease;
    }

    .builder-button:hover {
      background: var(--hover);
    }

    .builder-button:active {
      transform: translateY(1px);
    }

    .result-box {
      width: 100%;
      min-height: 114px;
      border: 1px solid #d9d9d9;
      border-radius: 16px;
      background: #fff;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .result-hint {
      font-size: 12px;
      color: #6f6f6f;
      margin-top: -4px;
    }

    .timer-title {
      width: 100%;
      padding: 18px 0 0;
      text-align: center;
      font-size: clamp(26px, 5.5vw, 36px);
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-top: 10px;
    }

    .circle-wrap {
      position: relative;
      width: min(64vw, 280px);
      height: min(64vw, 280px);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .circle-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      overflow: visible;
    }

    .track {
      fill: none;
      stroke: #dadada;
      stroke-width: var(--stroke);
    }

    .progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: var(--stroke);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.95s linear;
    }

    .time {
      position: relative;
      z-index: 1;
      font-size: clamp(28px, 8vw, 68px);
      line-height: 1;
      font-weight: 500;
      letter-spacing: -0.04em;
      text-align: center;
      width: 72%;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .minutes-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      flex-wrap: nowrap;
    }

    .minutes-label {
      min-width: 88px;
      text-align: center;
      font-size: clamp(18px, 4.4vw, 28px);
      color: var(--text);
      line-height: 1;
      font-weight: 500;
    }

    .minutes-label.disabled,
    .icon-button.disabled {
      color: var(--muted);
      opacity: 0.65;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 14px;
    }

    .icon-button {
      width: 82px;
      height: 82px;
      border-radius: var(--btn-radius);
      border: 1px solid #bababa;
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.18s ease, transform 0.08s ease, border-color 0.18s ease;
      color: var(--accent);
      flex: 0 0 auto;
      padding: 0;
    }

    .icon-button.small {
      width: 58px;
      height: 50px;
      border-radius: 16px;
      color: #2a2a2a;
      border-color: #c9c9c9;
    }

    .icon-button.tiny {
      width: 42px;
      height: 38px;
      border-radius: 12px;
      color: #2a2a2a;
      border-color: #d4d4d4;
    }

    .icon-button:hover:not(:disabled) {
      background: var(--hover);
    }

    .icon-button:active:not(:disabled) {
      transform: translateY(1px);
    }

    .icon-button:disabled {
      cursor: default;
    }

    .icon-button svg {
      width: 40%;
      height: 40%;
      display: block;
    }

    .icon-button.tiny svg {
      width: 36%;
      height: 36%;
    }

    .button-icon-img {
      width: 40%;
      height: 40%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    .footer-note {
      font-size: 12px;
      color: #7d7d7d;
      text-align: center;
      line-height: 1.4;
      margin-top: -6px;
      min-height: 16px;
    }

    @media (max-width: 900px) {
      .builder-shell {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 6px;
      }

      .card {
        padding: 14px 10px 16px;
        gap: 14px;
        border-radius: 22px;
      }

      .builder-grid,
      .builder-grid.compact,
      .result-layout {
        grid-template-columns: 1fr;
      }

      .builder-actions.side {
        width: 100%;
      }

      .builder-button {
        width: 100%;
      }

      .builder-title {
        font-size: 24px;
      }

      .timer-title {
        min-height: 54px;
        font-size: clamp(21px, 5vw, 28px);
      }

      .circle-wrap {
        width: min(60vw, 230px);
        height: min(60vw, 230px);
      }

      .time {
        font-size: clamp(24px, 7.5vw, 54px);
      }

      .minutes-row {
        gap: 8px;
      }

      .minutes-label {
        min-width: 74px;
        font-size: clamp(16px, 4vw, 22px);
      }

      .icon-button {
        width: 72px;
        height: 72px;
      }

      .icon-button.small {
        width: 50px;
        height: 44px;
      }

      .icon-button.tiny {
        width: 36px;
        height: 32px;
      }

      .controls {
        gap: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="builder-shell">

    <div class="card builder-card" id="builderCard">
      <h1 class="builder-title">Erstelle deinen Timer</h1>

      <p class="builder-subtitle">
        Titel und Startzeit eingeben. Danach den fertigen Link kopieren
        und in Notion per <strong>/embed</strong> einfügen.
      </p>

      <div class="builder-grid compact">
        <div class="field-group title-field">
          <label class="field-label" for="builderTitle">Titel</label>
          <input class="field-input" id="builderTitle" type="text" placeholder="z. B. Atemübung" maxlength="60" />
        </div>

        <div class="field-group minutes-field">
          <label class="field-label" for="builderMinutes">Startzeit in Minuten</label>
          <input class="field-input" id="builderMinutes" type="number" min="1" max="180" step="1" value="10" />
        </div>
      </div>

      <div class="result-layout">
        <div class="result-box" id="resultBox"></div>

        <div class="builder-actions side">
          <button class="builder-button" id="copyBtn" type="button">Link kopieren</button>
        </div>
      </div>

      <div class="result-hint">
        Tipp: Diesen Link kannst du speichern und immer wieder in deine Notion-Vorlagen einsetzen.
      </div>
    </div>

    <div class="preview-card-wrap">
      <div class="card" id="timerCard">
        <div class="timer-title" id="titleDisplay"></div>

        <div class="circle-wrap" aria-live="polite">
          <svg class="circle-svg" viewBox="0 0 100 100" aria-hidden="true">
            <circle class="track" cx="50" cy="50" r="44"></circle>
            <circle class="progress" cx="50" cy="50" r="44"></circle>
          </svg>
          <div class="time" id="timeDisplay">10:00</div>
        </div>

        <div class="minutes-row">
          <button class="icon-button tiny" id="decreaseSmallBtn" type="button" aria-label="1 Minute weniger">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M5 12H19" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"></path>
            </svg>
          </button>

          <button class="icon-button small" id="decreaseBtn" type="button" aria-label="5 Minuten weniger">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M5 12H19" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"></path>
            </svg>
          </button>

          <div class="minutes-label" id="minutesLabel">10 min</div>

          <button class="icon-button small" id="increaseBtn" type="button" aria-label="5 Minuten mehr">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"></path>
            </svg>
          </button>

          <button class="icon-button tiny" id="increaseSmallBtn" type="button" aria-label="1 Minute mehr">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"></path>
            </svg>
          </button>
        </div>

        <div class="controls">
          <button class="icon-button" id="startPauseBtn" type="button" aria-label="Start oder Pause">
            <img id="startPauseImg" class="button-icon-img" src="SoundPlayIcon-11.svg" alt="" aria-hidden="true" />
          </button>

          <button class="icon-button" id="resetBtn" type="button" aria-label="Zurücksetzen">
            <img class="button-icon-img" src="SoundPlayIcon-4.svg" alt="" aria-hidden="true" />
          </button>
        </div>

        <div class="footer-note" id="footerNote"></div>
      </div>
    </div>

  </div>

  <audio id="bellAudio" preload="auto" playsinline></audio>

  <script>
    const params = new URLSearchParams(window.location.search);
    const hasTimerParams = params.has('title') || params.has('minutes');

    const builderCard = document.getElementById('builderCard');
    const timerCard = document.getElementById('timerCard');
    const builderTitle = document.getElementById('builderTitle');
    const builderMinutes = document.getElementById('builderMinutes');
    const resultBox = document.getElementById('resultBox');
    const copyBtn = document.getElementById('copyBtn');

    const titleDisplay = document.getElementById('titleDisplay');
    const timeDisplay = document.getElementById('timeDisplay');
    const startPauseImg = document.getElementById('startPauseImg');
    const minutesLabel = document.getElementById('minutesLabel');
    const decreaseSmallBtn = document.getElementById('decreaseSmallBtn');
    const decreaseBtn = document.getElementById('decreaseBtn');
    const increaseBtn = document.getElementById('increaseBtn');
    const increaseSmallBtn = document.getElementById('increaseSmallBtn');
    const startPauseBtn = document.getElementById('startPauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const progressCircle = document.querySelector('.progress');
    const bellAudio = document.getElementById('bellAudio');
    const footerNote = document.getElementById('footerNote');

    if (!hasTimerParams) {
      builderCard.classList.remove('hidden');
      timerCard.classList.remove('hidden');
      document.body.classList.remove('timer-mode');
    } else {
      builderCard.classList.add('hidden');
      timerCard.classList.remove('hidden');
      document.body.classList.add('timer-mode');
    }

    const config = {
      minMinutes: Math.max(1, parseInt(params.get('min') || '1', 10)),
      maxMinutes: 180,
      defaultMinutes: Math.max(1, parseInt(params.get('minutes') || builderMinutes.value || '10', 10)),
      tickMs: 250,
      audioSrc: params.get('audio') || 'bell.mp3',
      autoplayBell: params.get('bell') !== 'off'
    };

    config.defaultMinutes = Math.min(config.maxMinutes, Math.max(config.minMinutes, config.defaultMinutes));

    const radius = 44;
    const circumference = 2 * Math.PI * radius;
    progressCircle.style.strokeDasharray = `${circumference}`;

    let totalSeconds = getPreviewMinutes() * 60;
    let remainingSeconds = totalSeconds;
    let isRunning = false;
    let intervalId = null;
    let endTime = null;
    let audioUnlocked = false;

    if (config.audioSrc) {
      bellAudio.src = config.audioSrc;
      bellAudio.load();
      footerNote.textContent = '';
    } else {
      footerNote.textContent = 'Kein Klang hinterlegt.';
    }

    bellAudio.addEventListener('error', () => {
      footerNote.textContent = 'Ton konnte nicht geladen werden.';
    });

    function baseUrl() {
      return `${window.location.origin}${window.location.pathname}`;
    }

    function buildTimerUrl() {
      const title = (builderTitle.value || '').trim();
      const minutes = Math.max(1, parseInt(builderMinutes.value || '10', 10));

      const url = new URL(baseUrl());
      if (title) url.searchParams.set('title', title);
      url.searchParams.set('minutes', String(minutes));

      return url.toString();
    }

    function getPreviewTitle() {
      if (hasTimerParams) {
        return (params.get('title') || '').trim() || 'Timer';
      }

      return (builderTitle.value || '').trim() || 'Timer';
    }

    function getPreviewMinutes() {
      if (hasTimerParams) {
        return Math.max(1, parseInt(params.get('minutes') || '10', 10));
      }

      return Math.max(1, parseInt(builderMinutes.value || '10', 10));
    }

    function refreshResult() {
      if (!hasTimerParams) {
        const url = buildTimerUrl();
        resultBox.textContent = url;
      }

      if (!isRunning) {
        totalSeconds = getPreviewMinutes() * 60;
        remainingSeconds = totalSeconds;
        render();
      } else {
        titleDisplay.textContent = getPreviewTitle();
      }
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;

      return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function updateProgress() {
      const progress = totalSeconds === 0 ? 0 : remainingSeconds / totalSeconds;
      const dashOffset = circumference * (1 - progress);

      progressCircle.style.strokeDashoffset = `${dashOffset}`;
    }

    function updateMinutesLabel() {
      const currentMinutes = Math.round(totalSeconds / 60);
      const disabled = isRunning;

      minutesLabel.textContent = `${currentMinutes} min`;
      minutesLabel.classList.toggle('disabled', disabled);

      decreaseSmallBtn.disabled = disabled || currentMinutes <= config.minMinutes;
      decreaseBtn.disabled = disabled || currentMinutes <= 5;
      increaseBtn.disabled = disabled || currentMinutes >= config.maxMinutes;
      increaseSmallBtn.disabled = disabled || currentMinutes >= config.maxMinutes;

      decreaseSmallBtn.classList.toggle('disabled', decreaseSmallBtn.disabled);
      decreaseBtn.classList.toggle('disabled', decreaseBtn.disabled);
      increaseBtn.classList.toggle('disabled', increaseBtn.disabled);
      increaseSmallBtn.classList.toggle('disabled', increaseSmallBtn.disabled);
    }

    function setPlayIcon() {
      startPauseImg.src = 'SoundPlayIcon-11.svg';
    }

    function setPauseIcon() {
      startPauseImg.src = 'pause-icon.svg';
    }

    function render() {
      titleDisplay.textContent = getPreviewTitle();
      timeDisplay.textContent = formatTime(remainingSeconds);
      updateProgress();
      updateMinutesLabel();

      if (isRunning) {
        setPauseIcon();
      } else {
        setPlayIcon();
      }
    }

    async function unlockAudio() {
      if (!config.audioSrc || audioUnlocked) return;

      try {
        bellAudio.muted = true;
        bellAudio.currentTime = 0;

        const playPromise = bellAudio.play();

        if (playPromise !== undefined) {
          await playPromise;
          bellAudio.pause();
          bellAudio.currentTime = 0;
        }

        bellAudio.muted = false;
        audioUnlocked = true;
      } catch (error) {
        bellAudio.muted = false;
        bellAudio.load();
        console.warn('Audio konnte nicht vorinitialisiert werden:', error);
      }
    }

    async function ringBell() {
      if (!config.audioSrc || !config.autoplayBell) return;

      try {
        bellAudio.pause();
        bellAudio.muted = false;
        bellAudio.currentTime = 0;
        await bellAudio.play();
        footerNote.textContent = '';
      } catch (error) {
        footerNote.textContent = 'Ton wurde vom Browser blockiert.';
        console.warn('Audio konnte nicht abgespielt werden:', error);
      }
    }

    function stopTimer() {
      isRunning = false;
      endTime = null;

      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }

      render();
    }

    function resetTimer() {
      stopTimer();

      remainingSeconds = totalSeconds;
      progressCircle.style.transition = 'none';
      updateProgress();

      requestAnimationFrame(() => {
        progressCircle.style.transition = 'stroke-dashoffset 0.95s linear';
        render();
      });
    }

    function finishTimer() {
      remainingSeconds = 0;
      stopTimer();
      render();
      ringBell();
    }

    function tick() {
      const now = Date.now();
      const secondsLeft = Math.max(0, Math.ceil((endTime - now) / 1000));

      remainingSeconds = secondsLeft;
      render();

      if (secondsLeft <= 0) {
        finishTimer();
      }
    }

    function startTimer() {
      if (remainingSeconds <= 0) {
        remainingSeconds = totalSeconds;
      }

      isRunning = true;
      endTime = Date.now() + remainingSeconds * 1000;

      tick();
      intervalId = setInterval(tick, config.tickMs);
      render();
    }

    async function toggleTimer() {
      if (isRunning) {
        stopTimer();
      } else {
        await unlockAudio();
        startTimer();
      }
    }

    function updateBuilderLinkOnly() {
      if (!hasTimerParams) {
        resultBox.textContent = buildTimerUrl();
      }
    }

    function changeMinutes(delta) {
      if (isRunning) return;

      const currentMinutes = Math.round(totalSeconds / 60);
      const nextMinutes = Math.min(config.maxMinutes, Math.max(config.minMinutes, currentMinutes + delta));

      totalSeconds = nextMinutes * 60;
      remainingSeconds = totalSeconds;

      if (!hasTimerParams) {
        builderMinutes.value = String(nextMinutes);
        updateBuilderLinkOnly();
      }

      render();
    }

    if (!hasTimerParams) {
      builderTitle.addEventListener('input', refreshResult);
      builderMinutes.addEventListener('input', refreshResult);
    }

    copyBtn.addEventListener('click', async () => {
      updateBuilderLinkOnly();

      try {
        await navigator.clipboard.writeText(resultBox.textContent);
        copyBtn.textContent = 'Kopiert';

        setTimeout(() => {
          copyBtn.textContent = 'Link kopieren';
        }, 1400);
      } catch (error) {
        copyBtn.textContent = 'Bitte manuell kopieren';

        setTimeout(() => {
          copyBtn.textContent = 'Link kopieren';
        }, 1600);
      }
    });

    startPauseBtn.addEventListener('click', toggleTimer);
    resetBtn.addEventListener('click', resetTimer);
    decreaseSmallBtn.addEventListener('click', () => changeMinutes(-1));
    decreaseBtn.addEventListener('click', () => changeMinutes(-5));
    increaseBtn.addEventListener('click', () => changeMinutes(5));
    increaseSmallBtn.addEventListener('click', () => changeMinutes(1));

    document.addEventListener('visibilitychange', () => {
      if (!isRunning || !endTime) return;

      if (!document.hidden) {
        tick();
      }
    });

    refreshResult();
  </script>
</body>
</html>
